<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Tab Video Timer • Options</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="stylesheet" href="options.css" />
</head>
<body>
  <main class="wrap">
    <h1>Tab Video Timer</h1>

    <section>
      <h2>Display</h2>

      <form id="form" autocomplete="off">
        <fieldset class="grid-2">
          <label>
            Live Title
            <input id="prefixLivePlaying" type="text" maxlength="20" placeholder="🔴 LIVE" />
          </label>

          <label>
            VOD Title
            <input id="prefixVODPlaying" type="text" maxlength="20" placeholder="⏳" />
          </label>

          <label>
            Paused Title
            <input id="prefixPaused" type="text" maxlength="20" placeholder="⏸" />
          </label>

          <label>
            Finished Text
            <input id="finishedPrefix" type="text" maxlength="30" placeholder="✓ Finished" />
          </label>
        </fieldset>

        <label>
          Finished hold (ms)
          <div class="row-inline">
            <input id="finishedHoldMs" type="number" min="0" step="500" />
            <label class="row-inline forever">
              <input id="finishedHoldForever" type="checkbox" />
              <span>∞ Forever</span>
            </label>
          </div>
          <span class="hint" id="finishedHoldHint"></span>
        </label>

        <fieldset class="grid-2">
          <label>
            Update interval (ms)
            <input id="updateIntervalMs" type="number" min="100" step="50" />
          </label>

          <label class="row">
            <input id="hideWhenInactive" type="checkbox" />
            <span>Hide timer when tab is inactive</span>
          </label>
        </fieldset>

        <fieldset class="grid-2">
          <label class="row">
            <input id="defaultEnabled" type="checkbox" />
            <span>Enable by default on new sites</span>
          </label>

          <label class="row">
            <input id="liveShowElapsed" type="checkbox" />
            <span>For live streams, show elapsed time (count-up) in the tab title</span>
          </label>
        </fieldset>

        <fieldset class="grid-2">
          <div>
            <span class="label-block">VOD Timer Mode</span>
            <div class="radio-group">
              <label class="row">
                <input type="radio" name="vodTimerMode" id="vodTimerModeCountdown" value="countdown" />
                <span>⬇ Countdown (time remaining)</span>
              </label>
              <label class="row">
                <input type="radio" name="vodTimerMode" id="vodTimerModeElapsed" value="elapsed" />
                <span>⬆ Elapsed (time watched)</span>
              </label>
            </div>
          </div>
          <div>
            <label>
              Title Separator
              <input id="separator" type="text" maxlength="10" placeholder=" • " />
            </label>
            <label class="row" style="margin-top:.6rem">
              <input id="showPercent" type="checkbox" />
              <span>Show % progress (e.g. 67%)</span>
            </label>
          </div>
        </fieldset>

        <div class="buttons">
          <button type="button" id="save">Save</button>
          <button type="button" id="reset">Reset to defaults</button>
        </div>

        <div id="status" aria-live="polite"></div>
      </form>
    </section>

    <section>
      <h2>Playback Display</h2>
      <div>
        <fieldset class="grid-2">
          <label class="row">
            <input id="speedAwareCountdown" type="checkbox" />
            <span>Speed-aware countdown (adjusts for 1.5×, 2× etc.)</span>
          </label>
          <label class="row">
            <input id="showChapters" type="checkbox" />
            <span>Show YouTube chapter name in tab title</span>
          </label>
          <label class="row">
            <input id="keepPlayingWhenInactive" type="checkbox" />
            <span>Keep video playing when tab is inactive</span>
          </label>
        </fieldset>
        <fieldset class="grid-2" style="margin-top:0.75rem">
          <label>
            Page Overlay Position
            <select id="overlayPosition">
              <option value="bottom-right">Bottom-right</option>
              <option value="bottom-left">Bottom-left</option>
              <option value="top-right">Top-right</option>
              <option value="top-left">Top-left</option>
            </select>
          </label>
          <label class="row" style="margin-top:auto">
            <input id="showOverlay" type="checkbox" />
            <span>Show floating overlay on page by default</span>
          </label>
        </fieldset>
      </div>
      <div class="buttons" style="margin-top:0.8rem">
        <button type="button" id="savePlayback">Save</button>
      </div>
      <div id="statusPlayback" aria-live="polite"></div>
    </section>

    <section>
      <h2>Watch Time &amp; Alerts</h2>
      <div>
        <fieldset class="grid-2">
          <label class="row">
            <input id="trackWatchTime" type="checkbox" />
            <span>Track watch time (used in popup Stats tab)</span>
          </label>
          <label class="row">
            <input id="endNotification" type="checkbox" />
            <span>Notify when video ends</span>
          </label>
        </fieldset>
        <fieldset class="grid-2" style="margin-top:0.75rem">
          <label>
            Break reminder (minutes)
            <input id="breakReminderMins" type="number" min="0" step="5" placeholder="0 = off" />
            <span class="hint">Notifies after this many continuous minutes of watching. 0 = disabled.</span>
          </label>
          <label>
            Daily limit (minutes)
            <input id="dailyLimitMins" type="number" min="0" step="15" placeholder="0 = off" />
            <span class="hint">Shows a warning bar in the popup when exceeded. 0 = disabled.</span>
          </label>
        </fieldset>
      </div>
      <div class="buttons" style="margin-top:0.8rem">
        <button type="button" id="saveAlerts">Save</button>
        <button type="button" id="clearStats">Clear Watch History</button>
      </div>
      <div id="statusAlerts" aria-live="polite"></div>
    </section>

    <section>
      <h2>Per-site Control</h2>

      <div class="site-row">
        <input id="currentHost" type="text" placeholder="example.com" />
        <button id="toggleSite">Toggle current site</button>
      </div>

      <div class="site-row">
        <label class="row">
          <input id="finishedEnabledThisSite" type="checkbox" />
          <span>Show “Finished” banner on this site</span>
        </label>
        <button id="applySitePrefs">Apply</button>
      </div>

      <details>
        <summary>Managed Sites</summary>
        <table id="sitesTable">
          <thead>
          <tr>
            <th>Hostname</th>
            <th>Enabled</th>
            <th>Finished</th>
            <th>Actions</th>
          </tr>
          </thead>
          <tbody></tbody>
        </table>
      </details>
    </section>

    <section>
      <h2>Shortcuts</h2>
      <p>Configure at <code>chrome://extensions/shortcuts</code> (Mute active tab, Enable/Disable on this site).</p>
    </section>
  </main>

  <script src="options.js"></script>
</body>
</html>
